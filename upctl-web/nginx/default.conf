resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen 80;
    server_name localhost;

    # upctl-web static files (Vue 3 SPA)
    root /usr/share/nginx/html;
    index index.html;

    # Gitea reverse proxy
    location /gitea/ {
        set $gitea_upstream http://gitea:3000;
        proxy_pass $gitea_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # AuthCore API
    location /api/v1/uc/ {
        set $authcore_upstream http://authcore:3000;
        proxy_pass $authcore_upstream;
        proxy_set_header Host $host;
        proxy_set_header HtyHost $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # upctl-svc API (ticket management + attachment)
    location /api/v2/upctl/api/ {
        set $upctl_upstream http://upctl-svc:3005;
        proxy_pass $upctl_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
