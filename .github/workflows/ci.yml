name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_BUILDKIT: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose config

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build upctl-svc
        uses: docker/build-push-action@v6
        with:
          context: ./upctl-svc
          tags: upctl-svc:ci
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Build upctl-web
        uses: docker/build-push-action@v6
        with:
          context: ./upctl-web
          tags: upctl-web:ci
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Build authcore
        uses: docker/build-push-action@v6
        with:
          context: ./authcore
          tags: authcore:ci
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  integration:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start dependencies (postgres + gitea)
        run: |
          docker compose up -d postgres gitea

      - name: Wait for postgres health
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U upctl && break
            sleep 2
          done

      - name: Start built services
        run: |
          docker compose up -d --no-build authcore upctl-svc upctl-web
          docker compose logs --tail=20 authcore upctl-svc upctl-web

      - name: Wait for authcore (30s timeout)
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ > /dev/null 2>&1 && echo "authcore ready" && break
            sleep 2
          done

      - name: Wait for upctl-svc (30s timeout)
        run: |
          for i in $(seq 1 30); do
            result=$(curl -sf http://localhost:3005/ 2>/dev/null || echo "")
            if [ "$result" = "upctl-svc" ]; then echo "upctl-svc ready"; break; fi
            sleep 2
          done

      - name: Smoke test — nginx serves frontend
        run: |
          http_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8088/)
          echo "nginx status: $http_code"
          test "$http_code" = "200" || test "$http_code" = "304"

      - name: Smoke test — frontend is an HTML page
        run: |
          content_type=$(curl -s -o /dev/null -w "%{content_type}" http://localhost:8088/)
          echo "Content-Type: $content_type"
          echo "$content_type" | grep -q "text/html"

      - name: Smoke test — upctl-svc reponds
        run: |
          result=$(curl -sf http://localhost:3005/)
          echo "upctl-svc: $result"
          test "$result" = "upctl-svc"

      - name: Cleanup
        if: always()
        run: docker compose down -v
