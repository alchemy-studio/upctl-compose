name: Compile Userguide PDF

on:
  schedule:
    - cron: '0 10 * * 1'  # 每周一 10:00 UTC
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CJK fonts
        run: |
          apt-get update -qq
          apt-get install -y -qq fonts-noto-cjk

      - name: Compile userguide PDF (pass 1)
        working-directory: userguide
        run: xelatex -interaction=nonstopmode userguide.tex || true

      - name: Compile userguide PDF (pass 2 — for TOC)
        working-directory: userguide
        run: xelatex -interaction=nonstopmode userguide.tex || true

      - name: Verify PDF was produced
        run: test -f userguide/userguide.pdf

      - name: Commit updated PDF
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "PWD=$(pwd)"
          ls -la "$GITHUB_WORKSPACE" | head -5
          ls -la "$GITHUB_WORKSPACE/.git" 2>/dev/null || echo "No .git at workspace"
          ls -la .git 2>/dev/null || echo "No .git at pwd"
          # Try the workspace path directly
          cd "$GITHUB_WORKSPACE" && test -d .git || { echo "Not a git repo at GITHUB_WORKSPACE"; exit 1; }
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add userguide/userguide.pdf
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update userguide PDF"
            git push
          else
            echo "No changes to commit"
          fi
