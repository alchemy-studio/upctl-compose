# Dependabot configuration for upctl-compose
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Docker images used in docker-compose.yml
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Python dependencies (ai-agent)
  - package-ecosystem: "pip"
    directory: "/ai-agent"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # npm dependencies (Playwright tests)
  - package-ecosystem: "npm"
    directory: "/tests/playwright"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
